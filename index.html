<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Software Hub · lzhenwei.dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    body {
      background: radial-gradient(circle at 20% 30%, #2d1b4e 0%, #1a0f2e 50%, #0d0620 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Liquid Glass animierte Hintergrund-Elemente */
    body::before {
      content: '';
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 40%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 50% 50%, rgba(192, 132, 252, 0.08) 0%, transparent 60%);
      animation: liquidMove 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes liquidMove {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(-3%, -2%) rotate(1deg); }
      66% { transform: translate(2%, 3%) rotate(-1deg); }
    }
    
    /* Floating Particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: rgba(168, 85, 247, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 2;
      padding: 2rem 1.5rem;
    }

    /* Liquid Glass Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease-out;
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      font-weight: 800;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #c084fc 0%, #e9d5ff 50%, #d8b4fe 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
      letter-spacing: -0.02em;
      position: relative;
      animation: titleGlow 3s ease-in-out infinite;
    }
    
    @keyframes titleGlow {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 20px rgba(168, 85, 247, 0.3)); }
      50% { filter: brightness(1.2) drop-shadow(0 0 40px rgba(168, 85, 247, 0.6)); }
    }
    
    h1 i {
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(192, 132, 252, 0.5));
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(5deg); }
    }
    
    /* Liquid Glass Auth Area */
    .auth-area {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(45, 27, 78, 0.4);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 0.6rem 1.2rem 0.6rem 1.8rem;
      border-radius: 60px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1),
                  0 0 0 1px rgba(168, 85, 247, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.3);
      animation: glassPulse 4s ease-in-out infinite;
    }
    
    @keyframes glassPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 0 1px rgba(168, 85, 247, 0.2); }
      50% { box-shadow: 0 12px 40px rgba(168, 85, 247, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 0 0 1px rgba(168, 85, 247, 0.4); }
    }
    
    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e9d5ff;
      font-weight: 500;
    }
    
    .user-badge i {
      color: #a855f7;
      font-size: 1.2rem;
      filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.6));
    }
    
    /* Liquid Glass Buttons */
    .btn {
      background: rgba(45, 27, 78, 0.5);
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #e9d5ff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-color: rgba(168, 85, 247, 0.6);
      background: rgba(88, 28, 135, 0.5);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, rgba(147, 51, 234, 0.8), rgba(126, 34, 206, 0.8));
      border-color: rgba(192, 132, 252, 0.5);
      color: white;
      box-shadow: 0 8px 24px rgba(147, 51, 234, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.9), rgba(147, 51, 234, 0.9));
      box-shadow: 0 12px 32px rgba(168, 85, 247, 0.5),
                  inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    
    .btn-outline-blue {
      background: rgba(45, 27, 78, 0.3);
      border-color: rgba(168, 85, 247, 0.4);
    }
    
    /* Liquid Glass Departments */
    .departments-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 2.5rem 0 1.5rem 0;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .departments-header h2 {
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, #d8b4fe, #e9d5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
    }
    
    .department-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 1rem;
    }
    
    .dept-card {
      background: rgba(45, 27, 78, 0.3);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 24px;
      padding: 1rem 2rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(168, 85, 247, 0.2);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #e9d5ff;
      animation: cardAppear 0.5s ease-out backwards;
      position: relative;
      overflow: hidden;
    }
    
    .dept-card::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .dept-card:hover::after {
      opacity: 1;
    }
    
    .dept-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 40px rgba(168, 85, 247, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-color: rgba(168, 85, 247, 0.5);
      background: rgba(88, 28, 135, 0.3);
    }
    
    .dept-card.active {
      border: 1.5px solid #a855f7;
      background: rgba(147, 51, 234, 0.2);
      box-shadow: 0 12px 32px rgba(168, 85, 247, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1),
                  0 0 0 2px rgba(168, 85, 247, 0.1);
      animation: activeGlow 3s ease-in-out infinite;
    }
    
    @keyframes activeGlow {
      0%, 100% { box-shadow: 0 12px 32px rgba(168, 85, 247, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 0 2px rgba(168, 85, 247, 0.1); }
      50% { box-shadow: 0 16px 40px rgba(168, 85, 247, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 0 0 3px rgba(168, 85, 247, 0.2); }
    }
    
    .dept-card i {
      color: #c084fc;
      filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.5));
    }
    
    /* Liquid Glass Software Section */
    .software-section {
      background: rgba(45, 27, 78, 0.25);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-radius: 40px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.2);
      margin-top: 1rem;
      animation: slideUp 0.8s ease-out 0.4s both;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    
    .section-title h3 {
      font-weight: 700;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #d8b4fe, #f3e8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .software-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
    }
    
    /* Liquid Glass Software Cards */
    .software-card {
      background: rgba(45, 27, 78, 0.3);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 28px;
      padding: 1.8rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(168, 85, 247, 0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: cardFloat 0.6s ease-out backwards;
    }
    
    .software-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    
    .software-card:hover::before {
      opacity: 1;
    }
    
    .software-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 50px rgba(168, 85, 247, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-color: rgba(168, 85, 247, 0.5);
    }
    
    .software-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    
    .software-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(147, 51, 234, 0.6), rgba(107, 33, 168, 0.6));
      backdrop-filter: blur(8px);
      border: 1px solid rgba(192, 132, 252, 0.4);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      color: #e9d5ff;
      flex-shrink: 0;
      animation: iconPulse 3s ease-in-out infinite;
    }
    
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1); }
      50% { box-shadow: 0 12px 28px rgba(168, 85, 247, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15); }
    }
    
    .software-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .software-title {
      flex: 1;
    }
    
    .software-name {
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 6px;
      color: #f3e8ff;
    }
    
    .software-version {
      font-size: 0.85rem;
      color: #c084fc;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .software-preview {
      width: 100%;
      height: 170px;
      border-radius: 18px;
      overflow: hidden;
      margin: 16px 0;
      background: rgba(20, 10, 40, 0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a78bfa;
      border: 1px solid rgba(168, 85, 247, 0.2);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
    }
    
    .software-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .software-description {
      color: #cbd5e1;
      font-size: 0.9rem;
      margin: 12px 0;
      line-height: 1.5;
    }
    
    .software-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
      position: relative;
      z-index: 1;
    }
    
    .status-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .status-active { 
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      border-color: rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }
    .status-maintenance { 
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
      border-color: rgba(245, 158, 11, 0.4);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
    }
    .status-discontinued { 
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.4);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
    }
    .status-down { 
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
      border-color: rgba(107, 114, 128, 0.4);
    }
    
    .dates-info {
      font-size: 0.8rem;
      color: #a78bfa;
      margin: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 1;
    }
    
    .dates-info i {
      width: 18px;
      color: #c084fc;
    }
    
    .software-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }
    
    .icon-btn {
      background: rgba(45, 27, 78, 0.4);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      color: #c084fc;
      cursor: pointer;
      padding: 10px;
      border-radius: 16px;
      width: 42px;
      height: 42px;
      transition: all 0.3s;
    }
    
    .icon-btn:hover {
      background: rgba(147, 51, 234, 0.4);
      color: #e9d5ff;
      border-color: #a855f7;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
      transform: scale(1.05);
    }
    
    /* Modal - Liquid Glass Design */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 5, 20, 0.7);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s;
    }
    
    .modal {
      background: rgba(30, 15, 60, 0.6);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border-radius: 40px;
      padding: 2.5rem;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      width: 90%;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.3);
      transform: scale(0.9) translateY(30px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #e9d5ff;
    }
    
    .modal-overlay[style*="visibility: visible"] .modal {
      transform: scale(1) translateY(0);
    }
    
    .modal h3 {
      font-size: 2rem;
      margin-bottom: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d8b4fe, #f3e8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .input-group {
      margin-bottom: 1.5rem;
    }
    
    .input-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      color: #c084fc;
    }
    
    .input-group input, 
    .input-group select, 
    .input-group textarea {
      width: 100%;
      padding: 14px 18px;
      background: rgba(20, 10, 40, 0.4);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      border-radius: 20px;
      font-size: 1rem;
      transition: all 0.3s;
      color: #f3e8ff;
    }
    
    .input-group input:focus, 
    .input-group select:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2), 0 0 20px rgba(168, 85, 247, 0.3);
      background: rgba(30, 15, 60, 0.6);
    }
    
    .input-group input::placeholder,
    .input-group textarea::placeholder {
      color: #8b5cf6;
    }
    
    .file-upload {
      border: 2px dashed rgba(168, 85, 247, 0.4);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(20, 10, 40, 0.2);
      backdrop-filter: blur(8px);
    }
    
    .file-upload:hover {
      border-color: #a855f7;
      background: rgba(147, 51, 234, 0.1);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
    }
    
    .file-upload i {
      font-size: 2.5rem;
      color: #c084fc;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5));
    }
    
    .file-upload p {
      color: #a78bfa;
    }
    
    .image-preview {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .image-preview img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: cover;
      border: 2px solid rgba(168, 85, 247, 0.4);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 2rem;
    }
    
    .hidden {
      display: none !important;
    }
    
    .footer-note {
      margin-top: 4rem;
      text-align: center;
      color: #a78bfa;
      font-size: 0.95rem;
      animation: fadeIn 1s ease-out 0.6s both;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
    }
    
    .empty-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem;
      color: #8b5cf6;
      font-size: 1.2rem;
      background: rgba(45, 27, 78, 0.2);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    
    .empty-message i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
      filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.3));
    }
    
    .register-link a {
      color: #c084fc;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .register-link a:hover {
      color: #e9d5ff;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 10px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(20, 10, 40, 0.3);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(147, 51, 234, 0.5);
      border-radius: 10px;
      border: 2px solid rgba(20, 10, 40, 0.3);
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(168, 85, 247, 0.7);
    }
    
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      h1 { font-size: 2rem; }
      .software-grid { grid-template-columns: 1fr; }
      .modal { padding: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-cube"></i> SoftRepo · lzhenwei</h1>
    <div class="auth-area">
      <div class="user-badge">
        <i class="fas fa-user-circle"></i>
        <span id="userEmailDisplay">Gast</span>
      </div>
      <button class="btn btn-primary" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Anmelden</button>
      <button class="btn hidden" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Abmelden</button>
    </div>
  </div>

  <div class="departments-header">
    <h2><i class="fas fa-folder-tree"></i> Abteilungen</h2>
    <button class="btn btn-outline-blue btn-sm hidden" id="addDeptBtn">
      <i class="fas fa-plus"></i> Neue Abteilung
    </button>
  </div>
  <div id="departmentsContainer" class="department-grid"></div>

  <div class="software-section">
    <div class="section-title">
      <h3 id="currentDeptTitle">Alle Software</h3>
      <button class="btn btn-outline-blue btn-sm hidden" id="addSoftwareBtn">
        <i class="fas fa-plus-circle"></i> Software hinzufügen
      </button>
    </div>
    <div id="softwareListContainer" class="software-grid">
      <div class="empty-message"><i class="fas fa-spinner fa-spin"></i><br>Lade Software...</div>
    </div>
  </div>
  <div class="footer-note">
    <i class="far fa-heart"></i> Öffentlich einsehbar · Bearbeitung nur für lzhenwei.dev@gmail.com
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h3 id="loginModalTitle">Anmelden</h3>
    <div class="input-group">
      <label>E-Mail</label>
      <input type="email" id="loginEmail" placeholder="deine@email.com">
    </div>
    <div class="input-group">
      <label>Passwort</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <div id="loginError" style="color: #fca5a5; margin-bottom: 1rem;"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelLogin">Abbrechen</button>
      <button class="btn btn-primary" id="submitLogin">Anmelden</button>
    </div>
    <div class="register-link" style="text-align: center; margin-top: 1.5rem;">
      Noch kein Konto? <a id="showRegisterLink">Jetzt registrieren</a>
    </div>
    <div style="margin-top: 1.5rem;">
      <button class="btn" id="googleLoginBtn" style="width: 100%;"><i class="fab fa-google"></i> Mit Google anmelden</button>
    </div>
  </div>
</div>

<!-- Software Modal -->
<div class="modal-overlay" id="softwareModal">
  <div class="modal">
    <h3 id="softwareModalTitle">Software hinzufügen</h3>
    
    <div class="input-group">
      <label>Name der Software *</label>
      <input type="text" id="swNameInput" placeholder="z.B. MyApp" required>
    </div>
    
    <div class="input-group">
      <label>Version</label>
      <input type="text" id="swVersionInput" placeholder="z.B. 1.0.0">
    </div>
    
    <div class="input-group">
      <label>GitHub Download-Link *</label>
      <input type="url" id="swLinkInput" placeholder="https://github.com/.../file.dmg" required>
    </div>
    
    <div class="input-group">
      <label>Projektstatus</label>
      <select id="swStatusSelect">
        <option value="active">🟢 Aktiv</option>
        <option value="maintenance">🟡 Wartung</option>
        <option value="discontinued">🔴 Eingestellt</option>
        <option value="down">⚫ Down</option>
      </select>
    </div>
    
    <div class="input-group">
      <label>App Icon (PNG, JPG)</label>
      <div class="file-upload" id="iconUploadArea">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Klicken oder ziehen zum Hochladen</p>
        <input type="file" id="iconFileInput" accept="image/*" style="display: none;">
      </div>
      <div id="iconPreview" class="image-preview"></div>
    </div>
    
    <div class="input-group">
      <label>Vorschaubild (PNG, JPG)</label>
      <div class="file-upload" id="previewUploadArea">
        <i class="fas fa-image"></i>
        <p>Klicken oder ziehen zum Hochladen</p>
        <input type="file" id="previewFileInput" accept="image/*" style="display: none;">
      </div>
      <div id="previewImagePreview" class="image-preview"></div>
    </div>
    
    <div class="input-group">
      <label>Beschreibung (optional)</label>
      <textarea id="swDescriptionInput" rows="3" placeholder="Kurze Beschreibung der Software..."></textarea>
    </div>
    
    <div class="modal-actions">
      <button class="btn" id="cancelSwModal">Abbrechen</button>
      <button class="btn btn-primary" id="saveSwBtn">Speichern</button>
    </div>
  </div>
</div>

<script type="module">
  // Firebase Konfiguration
  const firebaseConfig = {
    apiKey: "AIzaSyDjXg0y3vnuk8L7xBh9d_W80kzmWjilheo",
    authDomain: "software-lzw.firebaseapp.com",
    projectId: "software-lzw",
    storageBucket: "software-lzw.firebasestorage.app",
    messagingSenderId: "115286936457",
    appId: "1:115286936457:web:2f0d6be270bd4e3717ef58",
    measurementId: "G-EYY6BFBDCF"
  };

  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { 
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, 
    onAuthStateChanged, GoogleAuthProvider, signInWithPopup 
  } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { 
    getStorage, ref, uploadBytes, getDownloadURL, deleteObject 
  } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const storage = getStorage(app);
  const googleProvider = new GoogleAuthProvider();

  const ADMIN_EMAIL = 'lzhenwei.dev@gmail.com';
  
  let departments = [];
  let software = [];
  let currentUser = null;
  let selectedDeptId = null;
  let editingSwId = null;
  let iconFile = null;
  let previewFile = null;
  let existingIconUrl = null;
  let existingPreviewUrl = null;

  const userEmailDisplay = document.getElementById('userEmailDisplay');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const addDeptBtn = document.getElementById('addDeptBtn');
  const addSoftwareBtn = document.getElementById('addSoftwareBtn');
  const departmentsContainer = document.getElementById('departmentsContainer');
  const softwareListContainer = document.getElementById('softwareListContainer');
  const currentDeptTitle = document.getElementById('currentDeptTitle');
  const loginModal = document.getElementById('loginModal');
  const softwareModal = document.getElementById('softwareModal');

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);
  }
  
  function isAdmin() {
    return currentUser && currentUser.email === ADMIN_EMAIL;
  }

  function formatDate(timestamp) {
    if (!timestamp) return '—';
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function loadData() {
    onSnapshot(collection(db, "departments"), (snapshot) => {
      departments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderDepartments();
    });

    onSnapshot(query(collection(db, "software"), orderBy("createdAt", "desc")), (snapshot) => {
      software = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderSoftwareList();
    });
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    updateUIForAuth();
  });

  loadData();

  function updateUIForAuth() {
    const admin = isAdmin();
    
    if (admin) {
      addDeptBtn.classList.remove('hidden');
      addSoftwareBtn.classList.remove('hidden');
    } else {
      addDeptBtn.classList.add('hidden');
      addSoftwareBtn.classList.add('hidden');
    }
    
    if (currentUser) {
      userEmailDisplay.textContent = currentUser.email;
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
    } else {
      userEmailDisplay.textContent = 'Gast';
      loginBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
    }
    
    renderDepartments();
  }

  function renderDepartments() {
    let html = '';
    departments.forEach(dept => {
      html += `<div class="dept-card ${selectedDeptId === dept.id ? 'active' : ''}" data-dept-id="${dept.id}">
        <i class="fas fa-folder"></i><span>${escapeHtml(dept.name)}</span>
        ${isAdmin() ? `<div class="dept-actions">
          <button class="icon-btn edit-dept" data-id="${dept.id}"><i class="fas fa-pen"></i></button>
          <button class="icon-btn delete-dept" data-id="${dept.id}"><i class="fas fa-trash"></i></button>
        </div>` : ''}
      </div>`;
    });
    html += `<div class="dept-card ${selectedDeptId === null ? 'active' : ''}" data-dept-id="all">
      <i class="fas fa-globe"></i><span>Alle Software</span>
    </div>`;
    departmentsContainer.innerHTML = html;

    document.querySelectorAll('.dept-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        selectedDeptId = card.dataset.deptId === 'all' ? null : card.dataset.deptId;
        renderDepartments();
        renderSoftwareList();
      });
    });
  }

  function renderSoftwareList() {
    const filtered = selectedDeptId 
      ? software.filter(s => s.departmentId === selectedDeptId)
      : software;
    
    const deptName = selectedDeptId 
      ? (departments.find(d => d.id === selectedDeptId)?.name || 'Unbekannt')
      : 'Alle Software';
    currentDeptTitle.textContent = deptName;

    if (filtered.length === 0) {
      softwareListContainer.innerHTML = '<div class="empty-message"><i class="far fa-box-open"></i><br>Keine Software vorhanden</div>';
      return;
    }

    let html = '';
    filtered.forEach(sw => {
      const dept = departments.find(d => d.id === sw.departmentId);
      const statusClass = {
        active: 'status-active',
        maintenance: 'status-maintenance',
        discontinued: 'status-discontinued',
        down: 'status-down'
      }[sw.status] || 'status-active';
      const statusText = {
        active: 'Aktiv',
        maintenance: 'Wartung',
        discontinued: 'Eingestellt',
        down: 'Down'
      }[sw.status] || 'Aktiv';

      html += `<div class="software-card">
        <div class="software-header">
          <div class="software-icon">
            ${sw.iconUrl ? `<img src="${escapeHtml(sw.iconUrl)}" alt="Icon">` : '<i class="fas fa-cube"></i>'}
          </div>
          <div class="software-title">
            <div class="software-name">${escapeHtml(sw.name)}</div>
            <div class="software-version">
              <i class="fas fa-code-branch"></i> v${escapeHtml(sw.version || '1.0.0')}
            </div>
          </div>
        </div>
        
        <div class="software-preview">
          ${sw.previewUrl ? `<img src="${escapeHtml(sw.previewUrl)}" alt="Preview">` : '<i class="fas fa-image fa-2x"></i>'}
        </div>
        
        ${sw.description ? `<div class="software-description">${escapeHtml(sw.description)}</div>` : ''}
        
        <div class="software-meta">
          <span class="status-badge ${statusClass}">${statusText}</span>
          ${dept ? `<span style="font-size: 0.8rem; color: #a78bfa;"><i class="far fa-folder"></i> ${escapeHtml(dept.name)}</span>` : ''}
        </div>
        
        <div class="dates-info">
          <div><i class="far fa-calendar-plus"></i> Erstellt: ${formatDate(sw.createdAt)}</div>
          <div><i class="far fa-calendar-check"></i> Update: ${formatDate(sw.lastUpdated)}</div>
        </div>
        
        <div class="software-actions">
          <a href="${escapeHtml(sw.url)}" class="btn btn-sm" download style="flex: 1; text-align: center; text-decoration: none;">
            <i class="fas fa-download"></i> Download
          </a>
          ${isAdmin() ? `
            <button class="icon-btn edit-sw" data-id="${sw.id}"><i class="fas fa-pen"></i></button>
            <button class="icon-btn delete-sw" data-id="${sw.id}"><i class="fas fa-trash"></i></button>
          ` : ''}
        </div>
      </div>`;
    });
    softwareListContainer.innerHTML = html;

    if (isAdmin()) {
      document.querySelectorAll('.edit-sw').forEach(b => {
        b.addEventListener('click', () => openSoftwareModal(b.dataset.id));
      });
      document.querySelectorAll('.delete-sw').forEach(b => {
        b.addEventListener('click', () => deleteSoftware(b.dataset.id));
      });
    }
  }

  function openSoftwareModal(swId = null) {
    if (!isAdmin()) return;
    editingSwId = swId;
    
    document.getElementById('swNameInput').value = '';
    document.getElementById('swVersionInput').value = '';
    document.getElementById('swLinkInput').value = '';
    document.getElementById('swStatusSelect').value = 'active';
    document.getElementById('swDescriptionInput').value = '';
    document.getElementById('iconPreview').innerHTML = '';
    document.getElementById('previewImagePreview').innerHTML = '';
    iconFile = null;
    previewFile = null;
    existingIconUrl = null;
    existingPreviewUrl = null;
    
    if (swId) {
      const sw = software.find(s => s.id === swId);
      if (sw) {
        document.getElementById('swNameInput').value = sw.name || '';
        document.getElementById('swVersionInput').value = sw.version || '';
        document.getElementById('swLinkInput').value = sw.url || '';
        document.getElementById('swStatusSelect').value = sw.status || 'active';
        document.getElementById('swDescriptionInput').value = sw.description || '';
        existingIconUrl = sw.iconUrl;
        existingPreviewUrl = sw.previewUrl;
        
        if (sw.iconUrl) {
          document.getElementById('iconPreview').innerHTML = `<img src="${sw.iconUrl}" alt="Icon Preview">`;
        }
        if (sw.previewUrl) {
          document.getElementById('previewImagePreview').innerHTML = `<img src="${sw.previewUrl}" alt="Preview">`;
        }
        
        document.getElementById('softwareModalTitle').textContent = 'Software bearbeiten';
      }
    } else {
      document.getElementById('softwareModalTitle').textContent = 'Neue Software';
    }
    
    softwareModal.style.visibility = 'visible';
    softwareModal.style.opacity = '1';
  }

  async function uploadFile(file, path) {
    if (!file) return null;
    const storageRef = ref(storage, `${path}/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    return await getDownloadURL(storageRef);
  }

  async function saveSoftware() {
    const name = document.getElementById('swNameInput').value.trim();
    const version = document.getElementById('swVersionInput').value.trim() || '1.0.0';
    const url = document.getElementById('swLinkInput').value.trim();
    const status = document.getElementById('swStatusSelect').value;
    const description = document.getElementById('swDescriptionInput').value.trim();

    if (!name || !url) {
      alert('Name und Download-Link sind erforderlich');
      return;
    }

    let targetDept = selectedDeptId;
    if (!targetDept && !editingSwId) {
      if (departments.length === 0) {
        alert('Bitte zuerst eine Abteilung erstellen');
        return;
      }
      targetDept = departments[0].id;
    }

    try {
      let iconUrl = existingIconUrl;
      let previewUrl = existingPreviewUrl;
      
      if (iconFile) {
        iconUrl = await uploadFile(iconFile, 'icons');
      }
      
      if (previewFile) {
        previewUrl = await uploadFile(previewFile, 'previews');
      }

      const data = {
        name,
        version,
        url,
        status,
        description,
        iconUrl,
        previewUrl,
        lastUpdated: serverTimestamp()
      };

      if (editingSwId) {
        await updateDoc(doc(db, "software", editingSwId), data);
      } else {
        data.departmentId = targetDept;
        data.createdAt = serverTimestamp();
        await addDoc(collection(db, "software"), data);
      }
      
      closeSoftwareModal();
    } catch (error) {
      alert('Fehler beim Speichern: ' + error.message);
    }
  }

  async function deleteSoftware(swId) {
    if (!isAdmin() || !confirm('Software wirklich löschen?')) return;
    
    try {
      const sw = software.find(s => s.id === swId);
      
      if (sw?.iconUrl) {
        try { await deleteObject(ref(storage, sw.iconUrl)); } catch (e) {}
      }
      if (sw?.previewUrl) {
        try { await deleteObject(ref(storage, sw.previewUrl)); } catch (e) {}
      }
      
      await deleteDoc(doc(db, "software", swId));
    } catch (error) {
      alert('Fehler beim Löschen: ' + error.message);
    }
  }

  function closeSoftwareModal() {
    softwareModal.style.visibility = 'hidden';
    softwareModal.style.opacity = '0';
    editingSwId = null;
  }

  // File Upload Handlers
  document.getElementById('iconUploadArea').addEventListener('click', () => {
    document.getElementById('iconFileInput').click();
  });
  
  document.getElementById('iconFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      iconFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('iconPreview').innerHTML = `<img src="${e.target.result}" alt="Icon">`;
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById('previewUploadArea').addEventListener('click', () => {
    document.getElementById('previewFileInput').click();
  });
  
  document.getElementById('previewFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      previewFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('previewImagePreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
    }
  });

  // Drag & Drop
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    ['iconUploadArea', 'previewUploadArea'].forEach(id => {
      document.getElementById(id).addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
    });
  });

  document.getElementById('iconUploadArea').addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      iconFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('iconPreview').innerHTML = `<img src="${e.target.result}" alt="Icon">`;
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById('previewUploadArea').addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      previewFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('previewImagePreview').innerHTML = `<img src="${e.target.result}" alt="Preview">`;
      };
      reader.readAsDataURL(file);
    }
  });

  // Auth Funktionen
  async function loginWithEmail(email, password) {
    try {
      await signInWithEmailAndPassword(auth, email, password);
      closeLoginModal();
    } catch (error) {
      document.getElementById('loginError').textContent = 'Anmeldung fehlgeschlagen: ' + error.message;
    }
  }

  async function registerWithEmail(email, password) {
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      closeLoginModal();
      alert('Registrierung erfolgreich!');
    } catch (error) {
      document.getElementById('loginError').textContent = 'Registrierung fehlgeschlagen: ' + error.message;
    }
  }

  async function loginWithGoogle() {
    try {
      await signInWithPopup(auth, googleProvider);
      closeLoginModal();
    } catch (error) {
      document.getElementById('loginError').textContent = 'Google-Anmeldung fehlgeschlagen';
    }
  }

  async function logout() {
    await signOut(auth);
    selectedDeptId = null;
  }

  function closeLoginModal() {
    loginModal.style.visibility = 'hidden';
    loginModal.style.opacity = '0';
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }

  // Event Listener
  loginBtn.addEventListener('click', () => {
    loginModal.style.visibility = 'visible';
    loginModal.style.opacity = '1';
  });

  logoutBtn.addEventListener('click', logout);
  document.getElementById('cancelLogin').addEventListener('click', closeLoginModal);
  
  document.getElementById('submitLogin').addEventListener('click', () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      document.getElementById('loginError').textContent = 'Bitte E-Mail und Passwort eingeben';
      return;
    }

    if (document.getElementById('loginModalTitle').textContent === 'Registrieren') {
      registerWithEmail(email, password);
    } else {
      loginWithEmail(email, password);
    }
  });

  document.getElementById('showRegisterLink').addEventListener('click', () => {
    document.getElementById('loginModalTitle').textContent = 'Registrieren';
    document.getElementById('submitLogin').textContent = 'Registrieren';
  });

  document.getElementById('googleLoginBtn').addEventListener('click', loginWithGoogle);
  
  addSoftwareBtn.addEventListener('click', () => {
    if (!selectedDeptId && departments.length === 0) {
      alert('Bitte zuerst eine Abteilung erstellen');
      return;
    }
    openSoftwareModal(null);
  });
  
  document.getElementById('cancelSwModal').addEventListener('click', closeSoftwareModal);
  document.getElementById('saveSwBtn').addEventListener('click', saveSoftware);

  loginModal.addEventListener('click', (e) => { if (e.target === loginModal) closeLoginModal(); });
  softwareModal.addEventListener('click', (e) => { if (e.target === softwareModal) closeSoftwareModal(); });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeLoginModal();
      closeSoftwareModal();
    }
  });
</script>
</body>
</html>
