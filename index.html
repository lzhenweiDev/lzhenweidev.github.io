<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Software Hub Test</title>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: #333;
      padding: 30px;
      border-radius: 10px;
      z-index: 1000;
      max-width: 500px;
      width: 90%;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
    }
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #333;
    }
    .input-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .software-card {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 10px;
      margin: 10px 0;
    }
    .hidden {
      display: none !important;
    }
    #status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .success {
      background: rgba(76, 175, 80, 0.3);
    }
    .error {
      background: rgba(244, 67, 54, 0.3);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Software Hub Test</h1>
    <div>
      <span id="userStatus">Nicht angemeldet</span>
      <button class="btn" id="loginBtn">Anmelden</button>
      <button class="btn hidden" id="logoutBtn">Abmelden</button>
    </div>
  </div>

  <div id="status"></div>

  <div>
    <h2>Abteilungen</h2>
    <button class="btn" id="addDeptBtn" disabled>Neue Abteilung</button>
    <div id="departmentsList"></div>
  </div>

  <div>
    <h2>Software</h2>
    <button class="btn" id="addSoftwareBtn" disabled>Neue Software</button>
    <div id="softwareList"></div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay hidden" id="loginModal">
  <div class="modal">
    <h3>Anmelden</h3>
    <div class="input-group">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="deine@email.com">
    </div>
    <div class="input-group">
      <label>Passwort</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div id="loginError" style="color: red; margin-bottom: 10px;"></div>
    <button class="btn" id="doLogin">Anmelden</button>
    <button class="btn" id="cancelLogin">Abbrechen</button>
  </div>
</div>

<!-- Software Modal -->
<div class="modal-overlay hidden" id="softwareModal">
  <div class="modal">
    <h3>Software hinzufügen</h3>
    <div class="input-group">
      <label>Name *</label>
      <input type="text" id="swName" placeholder="Meine App">
    </div>
    <div class="input-group">
      <label>Download-Link *</label>
      <input type="text" id="swLink" placeholder="https://...">
    </div>
    <button class="btn" id="saveSoftware">Speichern</button>
    <button class="btn" id="cancelSoftware">Abbrechen</button>
  </div>
</div>

<script type="module">
  // Firebase Konfiguration
  const firebaseConfig = {
    apiKey: "AIzaSyDjXg0y3vnuk8L7xBh9d_W80kzmWjilheo",
    authDomain: "software-lzw.firebaseapp.com",
    projectId: "software-lzw",
    storageBucket: "software-lzw.firebasestorage.app",
    messagingSenderId: "115286936457",
    appId: "1:115286936457:web:2f0d6be270bd4e3717ef58"
  };

  console.log('🚀 Starte App...');

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

  try {
    const app = initializeApp(firebaseConfig);
    console.log('✅ Firebase initialisiert');
    
    const db = getFirestore(app);
    console.log('✅ Firestore initialisiert');
    
    const auth = getAuth(app);
    console.log('✅ Auth initialisiert');

    const ADMIN_EMAIL = 'lzhenwei.dev@gmail.com';
    let currentUser = null;

    // UI Elements
    const userStatus = document.getElementById('userStatus');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const addDeptBtn = document.getElementById('addDeptBtn');
    const addSoftwareBtn = document.getElementById('addSoftwareBtn');
    const loginModal = document.getElementById('loginModal');
    const softwareModal = document.getElementById('softwareModal');
    const statusDiv = document.getElementById('status');

    function showStatus(message, isError = false) {
      statusDiv.innerHTML = message;
      statusDiv.className = isError ? 'error' : 'success';
      setTimeout(() => statusDiv.innerHTML = '', 3000);
    }

    // Auth Observer
    onAuthStateChanged(auth, (user) => {
      console.log('👤 Auth State:', user?.email);
      currentUser = user;
      
      if (user) {
        userStatus.textContent = `Angemeldet als: ${user.email}`;
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
        
        const isAdmin = user.email === ADMIN_EMAIL;
        addDeptBtn.disabled = !isAdmin;
        addSoftwareBtn.disabled = !isAdmin;
        
        showStatus(`✅ Angemeldet als ${user.email} ${isAdmin ? '(Admin)' : '(User)'}`);
      } else {
        userStatus.textContent = 'Nicht angemeldet';
        loginBtn.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
        addDeptBtn.disabled = true;
        addSoftwareBtn.disabled = true;
      }
      
      loadData();
    });

    // Daten laden
    function loadData() {
      console.log('📊 Lade Daten...');
      
      // Departments laden
      const deptsRef = collection(db, "departments");
      onSnapshot(deptsRef, (snapshot) => {
        console.log(`📁 ${snapshot.docs.length} Abteilungen geladen`);
        const deptsList = document.getElementById('departmentsList');
        deptsList.innerHTML = snapshot.docs.map(doc => 
          `<div>📁 ${doc.data().name}</div>`
        ).join('') || '<div>Keine Abteilungen</div>';
      });

      // Software laden
      const softwareRef = collection(db, "software");
      onSnapshot(softwareRef, (snapshot) => {
        console.log(`💾 ${snapshot.docs.length} Software geladen`);
        const swList = document.getElementById('softwareList');
        swList.innerHTML = snapshot.docs.map(doc => {
          const data = doc.data();
          return `<div class="software-card">
            <h3>${data.name}</h3>
            <a href="${data.url}" target="_blank">Download</a>
          </div>`;
        }).join('') || '<div>Keine Software</div>';
      });
    }

    // Login
    loginBtn.addEventListener('click', () => {
      console.log('🔓 Login Modal öffnen');
      loginModal.classList.remove('hidden');
    });

    document.getElementById('cancelLogin').addEventListener('click', () => {
      loginModal.classList.add('hidden');
    });

    document.getElementById('doLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      console.log('🔐 Login Versuch:', email);
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        console.log('✅ Login erfolgreich');
        loginModal.classList.add('hidden');
        showStatus('✅ Login erfolgreich!');
      } catch (error) {
        console.error('❌ Login Fehler:', error);
        document.getElementById('loginError').textContent = error.message;
        showStatus(`❌ Login fehlgeschlagen: ${error.message}`, true);
      }
    });

    // Logout
    logoutBtn.addEventListener('click', async () => {
      console.log('🚪 Logout');
      await signOut(auth);
      showStatus('👋 Abgemeldet');
    });

    // Software hinzufügen
    addSoftwareBtn.addEventListener('click', () => {
      console.log('➕ Software Modal öffnen');
      if (!currentUser) {
        showStatus('❌ Bitte zuerst anmelden!', true);
        return;
      }
      softwareModal.classList.remove('hidden');
    });

    document.getElementById('cancelSoftware').addEventListener('click', () => {
      softwareModal.classList.add('hidden');
    });

    document.getElementById('saveSoftware').addEventListener('click', async () => {
      const name = document.getElementById('swName').value;
      const url = document.getElementById('swLink').value;
      
      console.log('💾 Speichere Software:', { name, url });
      
      if (!name || !url) {
        showStatus('❌ Name und Link sind erforderlich!', true);
        return;
      }

      try {
        // Erste Abteilung finden oder erstellen
        const deptsSnapshot = await getDocs(collection(db, "departments"));
        let deptId;
        
        if (deptsSnapshot.empty) {
          console.log('📁 Erstelle erste Abteilung...');
          const newDept = await addDoc(collection(db, "departments"), {
            name: "Allgemein"
          });
          deptId = newDept.id;
          console.log('✅ Abteilung erstellt:', deptId);
        } else {
          deptId = deptsSnapshot.docs[0].id;
        }

        // Software speichern
        const softwareData = {
          name: name,
          url: url,
          departmentId: deptId,
          status: 'active',
          version: '1.0.0',
          createdAt: new Date().toISOString()
        };

        console.log('💾 Speichere in Firestore:', softwareData);
        const docRef = await addDoc(collection(db, "software"), softwareData);
        console.log('✅ Software gespeichert mit ID:', docRef.id);
        
        softwareModal.classList.add('hidden');
        document.getElementById('swName').value = '';
        document.getElementById('swLink').value = '';
        showStatus('✅ Software erfolgreich hinzugefügt!');
      } catch (error) {
        console.error('❌ Fehler beim Speichern:', error);
        showStatus(`❌ Fehler: ${error.message}`, true);
      }
    });

    // Overlay schließen
    loginModal.addEventListener('click', (e) => {
      if (e.target === loginModal) loginModal.classList.add('hidden');
    });
    
    softwareModal.addEventListener('click', (e) => {
      if (e.target === softwareModal) softwareModal.classList.add('hidden');
    });

    console.log('✅ App vollständig geladen!');

  } catch (error) {
    console.error('❌ FATALER FEHLER:', error);
    document.body.innerHTML = `<h1 style="color: red;">Fehler: ${error.message}</h1>`;
  }
</script>
</body>
</html>
