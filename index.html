<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Software Hub · lzhenwei.dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* CSS bleibt gleich wie in der vorherigen Version */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    :root { --primary-hue: 270; --primary-color: hsl(270, 80%, 60%); }
    
    body {
      background: radial-gradient(circle at 20% 30%, #2d1b4e 0%, #1a0f2e 50%, #0d0620 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding: 1rem;
      background: rgba(45, 27, 78, 0.3);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      border: 1px solid rgba(168, 85, 247, 0.3);
    }
    
    h1 {
      background: linear-gradient(135deg, #c084fc, #e9d5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2rem;
    }
    
    .auth-area {
      display: flex;
      gap: 1rem;
      align-items: center;
      color: #e9d5ff;
    }
    
    .btn {
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      border: 1px solid rgba(168, 85, 247, 0.4);
      background: rgba(45, 27, 78, 0.4);
      backdrop-filter: blur(20px);
      color: #e9d5ff;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn:hover {
      background: rgba(147, 51, 234, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
    }
    
    .btn-primary {
      background: rgba(147, 51, 234, 0.6);
      border-color: rgba(192, 132, 252, 0.6);
    }
    
    /* Departments */
    .departments-section {
      margin: 2rem 0;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    h2 {
      color: #d8b4fe;
      font-size: 1.8rem;
    }
    
    .departments-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .dept-card {
      background: rgba(45, 27, 78, 0.3);
      backdrop-filter: blur(20px);
      padding: 1rem 2rem;
      border-radius: 20px;
      border: 1px solid rgba(168, 85, 247, 0.3);
      color: #e9d5ff;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .dept-card:hover {
      background: rgba(147, 51, 234, 0.3);
      transform: translateY(-3px);
    }
    
    .dept-card.active {
      border: 2px solid #a855f7;
      background: rgba(147, 51, 234, 0.4);
    }
    
    /* Software Grid */
    .software-section {
      background: rgba(45, 27, 78, 0.2);
      backdrop-filter: blur(30px);
      border-radius: 30px;
      padding: 2rem;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    
    .software-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    
    .software-card {
      background: rgba(45, 27, 78, 0.3);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 1.5rem;
      border: 1px solid rgba(168, 85, 247, 0.3);
      transition: all 0.3s;
    }
    
    .software-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(168, 85, 247, 0.2);
    }
    
    .software-icon {
      width: 60px;
      height: 60px;
      background: rgba(147, 51, 234, 0.4);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #e9d5ff;
      margin-bottom: 1rem;
    }
    
    .software-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 15px;
    }
    
    .software-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f3e8ff;
      margin-bottom: 0.5rem;
    }
    
    .software-version {
      color: #c084fc;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .software-preview {
      width: 100%;
      height: 160px;
      background: rgba(20, 10, 40, 0.4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1rem 0;
      overflow: hidden;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }
    
    .software-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .status-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin: 0.5rem 0;
    }
    
    .status-active { background: rgba(16, 185, 129, 0.3); color: #6ee7b7; }
    .status-maintenance { background: rgba(245, 158, 11, 0.3); color: #fcd34d; }
    .status-discontinued { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .status-down { background: rgba(107, 114, 128, 0.3); color: #d1d5db; }
    
    .software-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    
    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30, 15, 60, 0.95);
      backdrop-filter: blur(30px);
      padding: 2rem;
      border-radius: 30px;
      border: 1px solid rgba(168, 85, 247, 0.4);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      z-index: 1000;
      color: #e9d5ff;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 999;
    }
    
    .input-group {
      margin-bottom: 1.5rem;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #c084fc;
      font-weight: 600;
    }
    
    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 0.8rem;
      border-radius: 15px;
      border: 1px solid rgba(168, 85, 247, 0.4);
      background: rgba(20, 10, 40, 0.5);
      color: #e9d5ff;
      font-size: 1rem;
    }
    
    .file-upload {
      border: 2px dashed rgba(168, 85, 247, 0.4);
      border-radius: 15px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .file-upload:hover {
      border-color: #a855f7;
      background: rgba(147, 51, 234, 0.1);
    }
    
    .hidden { display: none !important; }
    
    .empty-message {
      text-align: center;
      padding: 3rem;
      color: #8b5cf6;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1><i class="fas fa-cube"></i> SoftRepo · lzhenwei</h1>
    <div class="auth-area">
      <span id="userEmailDisplay">Gast</span>
      <button class="btn btn-primary" id="loginBtn">Anmelden</button>
      <button class="btn hidden" id="logoutBtn">Abmelden</button>
    </div>
  </div>

  <!-- Abteilungen -->
  <div class="departments-section">
    <div class="section-header">
      <h2><i class="fas fa-folder-tree"></i> Abteilungen</h2>
      <button class="btn hidden" id="addDeptBtn"><i class="fas fa-plus"></i> Neue Abteilung</button>
    </div>
    <div class="departments-grid" id="departmentsContainer"></div>
  </div>

  <!-- Software -->
  <div class="software-section">
    <div class="section-header">
      <h2 id="currentDeptTitle">Alle Software</h2>
      <button class="btn hidden" id="addSoftwareBtn"><i class="fas fa-plus"></i> Software hinzufügen</button>
    </div>
    <div class="software-grid" id="softwareContainer">
      <div class="empty-message">Lade Software...</div>
    </div>
  </div>
</div>

<!-- Abteilung Modal -->
<div class="modal-overlay hidden" id="deptModalOverlay">
  <div class="modal">
    <h3 id="deptModalTitle">Neue Abteilung</h3>
    <div class="input-group">
      <label>Name der Abteilung</label>
      <input type="text" id="deptNameInput" placeholder="z.B. Entwicklung">
    </div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end;">
      <button class="btn" id="cancelDeptBtn">Abbrechen</button>
      <button class="btn btn-primary" id="saveDeptBtn">Speichern</button>
    </div>
  </div>
</div>

<!-- Software Modal -->
<div class="modal-overlay hidden" id="softwareModalOverlay">
  <div class="modal">
    <h3 id="softwareModalTitle">Software hinzufügen</h3>
    
    <div class="input-group">
      <label>Name *</label>
      <input type="text" id="swName" placeholder="Meine App">
    </div>
    
    <div class="input-group">
      <label>Version</label>
      <input type="text" id="swVersion" placeholder="1.0.0" value="1.0.0">
    </div>
    
    <div class="input-group">
      <label>Download-Link (GitHub) *</label>
      <input type="url" id="swLink" placeholder="https://github.com/.../app.dmg">
    </div>
    
    <div class="input-group">
      <label>Status</label>
      <select id="swStatus">
        <option value="active">🟢 Aktiv</option>
        <option value="maintenance">🟡 Wartung</option>
        <option value="discontinued">🔴 Eingestellt</option>
        <option value="down">⚫ Down</option>
      </select>
    </div>
    
    <div class="input-group">
      <label>Icon (optional)</label>
      <div class="file-upload" id="iconUploadBtn">
        <i class="fas fa-image"></i> Icon hochladen
      </div>
      <input type="file" id="iconFile" accept="image/*" style="display: none;">
      <div id="iconPreview"></div>
    </div>
    
    <div class="input-group">
      <label>Vorschaubild (optional)</label>
      <div class="file-upload" id="previewUploadBtn">
        <i class="fas fa-image"></i> Vorschau hochladen
      </div>
      <input type="file" id="previewFile" accept="image/*" style="display: none;">
      <div id="previewImagePreview"></div>
    </div>
    
    <div class="input-group">
      <label>Beschreibung</label>
      <textarea id="swDescription" rows="3" placeholder="Beschreibung..."></textarea>
    </div>
    
    <div style="display: flex; gap: 1rem; justify-content: flex-end;">
      <button class="btn" id="cancelSwBtn">Abbrechen</button>
      <button class="btn btn-primary" id="saveSwBtn">Speichern</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay hidden" id="loginModalOverlay">
  <div class="modal">
    <h3>Anmelden</h3>
    <div class="input-group">
      <label>E-Mail</label>
      <input type="email" id="loginEmail" placeholder="deine@email.com">
    </div>
    <div class="input-group">
      <label>Passwort</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <div id="loginError" style="color: #fca5a5; margin-bottom: 1rem;"></div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end;">
      <button class="btn" id="cancelLoginBtn">Abbrechen</button>
      <button class="btn btn-primary" id="submitLoginBtn">Anmelden</button>
    </div>
  </div>
</div>

<script type="module">
  // Firebase Konfiguration
  const firebaseConfig = {
    apiKey: "AIzaSyDjXg0y3vnuk8L7xBh9d_W80kzmWjilheo",
    authDomain: "software-lzw.firebaseapp.com",
    projectId: "software-lzw",
    storageBucket: "software-lzw.firebasestorage.app",
    messagingSenderId: "115286936457",
    appId: "1:115286936457:web:2f0d6be270bd4e3717ef58"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const storage = getStorage(app);
  
  const ADMIN_EMAIL = 'lzhenwei.dev@gmail.com';
  
  let departments = [];
  let software = [];
  let currentUser = null;
  let selectedDeptId = null;
  let editingSwId = null;
  let editingDeptId = null;
  let iconFile = null;
  let previewFile = null;

  // UI Elements
  const userEmailDisplay = document.getElementById('userEmailDisplay');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const addDeptBtn = document.getElementById('addDeptBtn');
  const addSoftwareBtn = document.getElementById('addSoftwareBtn');
  const departmentsContainer = document.getElementById('departmentsContainer');
  const softwareContainer = document.getElementById('softwareContainer');
  const currentDeptTitle = document.getElementById('currentDeptTitle');
  
  const deptModalOverlay = document.getElementById('deptModalOverlay');
  const softwareModalOverlay = document.getElementById('softwareModalOverlay');
  const loginModalOverlay = document.getElementById('loginModalOverlay');

  function isAdmin() {
    return currentUser && currentUser.email === ADMIN_EMAIL;
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);
  }

  function formatDate(timestamp) {
    if (!timestamp) return 'Neu';
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleDateString('de-DE');
  }

  // Auth Observer
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    userEmailDisplay.textContent = user ? user.email : 'Gast';
    loginBtn.classList.toggle('hidden', !!user);
    logoutBtn.classList.toggle('hidden', !user);
    addDeptBtn.classList.toggle('hidden', !isAdmin());
    addSoftwareBtn.classList.toggle('hidden', !isAdmin());
    loadData();
  });

  // Daten laden
  function loadData() {
    // Departments laden
    onSnapshot(collection(db, "departments"), (snapshot) => {
      departments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderDepartments();
    });

    // Software laden
    onSnapshot(query(collection(db, "software"), orderBy("createdAt", "desc")), (snapshot) => {
      software = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderSoftware();
    });
  }

  function renderDepartments() {
    let html = '';
    departments.forEach(dept => {
      html += `<div class="dept-card ${selectedDeptId === dept.id ? 'active' : ''}" data-id="${dept.id}">
        <i class="fas fa-folder"></i> ${escapeHtml(dept.name)}
        ${isAdmin() ? `<button class="delete-dept" data-id="${dept.id}" style="margin-left: 1rem; background: none; border: none; color: #ef4444; cursor: pointer;">🗑️</button>` : ''}
      </div>`;
    });
    html += `<div class="dept-card ${selectedDeptId === null ? 'active' : ''}" data-id="all">
      <i class="fas fa-globe"></i> Alle Software
    </div>`;
    departmentsContainer.innerHTML = html;

    // Event Listener
    document.querySelectorAll('.dept-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-dept')) return;
        const id = card.dataset.id;
        selectedDeptId = id === 'all' ? null : id;
        renderDepartments();
        renderSoftware();
      });
    });

    if (isAdmin()) {
      document.querySelectorAll('.delete-dept').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (confirm('Abteilung löschen?')) {
            await deleteDoc(doc(db, "departments", btn.dataset.id));
            if (selectedDeptId === btn.dataset.id) selectedDeptId = null;
          }
        });
      });
    }
  }

  function renderSoftware() {
    const filtered = selectedDeptId 
      ? software.filter(s => s.departmentId === selectedDeptId)
      : software;
    
    const deptName = selectedDeptId 
      ? departments.find(d => d.id === selectedDeptId)?.name || 'Unbekannt'
      : 'Alle Software';
    currentDeptTitle.textContent = deptName;

    if (filtered.length === 0) {
      softwareContainer.innerHTML = '<div class="empty-message"><i class="fas fa-box-open"></i><br>Keine Software vorhanden</div>';
      return;
    }

    let html = '';
    filtered.forEach(sw => {
      const statusClass = `status-${sw.status || 'active'}`;
      const statusText = { active: 'Aktiv', maintenance: 'Wartung', discontinued: 'Eingestellt', down: 'Down' }[sw.status] || 'Aktiv';

      html += `<div class="software-card">
        <div class="software-icon">
          ${sw.iconUrl ? `<img src="${escapeHtml(sw.iconUrl)}" alt="Icon">` : '<i class="fas fa-cube"></i>'}
        </div>
        <div class="software-name">${escapeHtml(sw.name)}</div>
        <div class="software-version">v${escapeHtml(sw.version || '1.0.0')}</div>
        
        <div class="software-preview">
          ${sw.previewUrl ? `<img src="${escapeHtml(sw.previewUrl)}" alt="Preview">` : '<i class="fas fa-image"></i>'}
        </div>
        
        ${sw.description ? `<p style="color: #cbd5e1; margin: 0.5rem 0;">${escapeHtml(sw.description)}</p>` : ''}
        
        <span class="status-badge ${statusClass}">${statusText}</span>
        <div style="color: #a78bfa; font-size: 0.8rem; margin: 0.5rem 0;">
          Erstellt: ${formatDate(sw.createdAt)}
        </div>
        
        <div class="software-actions">
          <a href="${escapeHtml(sw.url)}" class="btn btn-primary" download style="flex: 1; text-align: center;">Download</a>
          ${isAdmin() ? `
            <button class="btn edit-sw" data-id="${sw.id}">✏️</button>
            <button class="btn delete-sw" data-id="${sw.id}">🗑️</button>
          ` : ''}
        </div>
      </div>`;
    });
    softwareContainer.innerHTML = html;

    if (isAdmin()) {
      document.querySelectorAll('.edit-sw').forEach(btn => {
        btn.addEventListener('click', () => openSoftwareModal(btn.dataset.id));
      });
      document.querySelectorAll('.delete-sw').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm('Software löschen?')) {
            await deleteDoc(doc(db, "software", btn.dataset.id));
          }
        });
      });
    }
  }

  // Modal Funktionen
  function openDeptModal(deptId = null) {
    editingDeptId = deptId;
    document.getElementById('deptNameInput').value = deptId ? departments.find(d => d.id === deptId)?.name || '' : '';
    document.getElementById('deptModalTitle').textContent = deptId ? 'Abteilung bearbeiten' : 'Neue Abteilung';
    deptModalOverlay.classList.remove('hidden');
  }

  function openSoftwareModal(swId = null) {
    editingSwId = swId;
    
    // Reset
    document.getElementById('swName').value = '';
    document.getElementById('swVersion').value = '1.0.0';
    document.getElementById('swLink').value = '';
    document.getElementById('swStatus').value = 'active';
    document.getElementById('swDescription').value = '';
    document.getElementById('iconPreview').innerHTML = '';
    document.getElementById('previewImagePreview').innerHTML = '';
    iconFile = null;
    previewFile = null;
    
    if (swId) {
      const sw = software.find(s => s.id === swId);
      if (sw) {
        document.getElementById('swName').value = sw.name || '';
        document.getElementById('swVersion').value = sw.version || '1.0.0';
        document.getElementById('swLink').value = sw.url || '';
        document.getElementById('swStatus').value = sw.status || 'active';
        document.getElementById('swDescription').value = sw.description || '';
        if (sw.iconUrl) {
          document.getElementById('iconPreview').innerHTML = `<img src="${sw.iconUrl}" style="width: 80px; height: 80px; border-radius: 10px;">`;
        }
        if (sw.previewUrl) {
          document.getElementById('previewImagePreview').innerHTML = `<img src="${sw.previewUrl}" style="width: 100%; max-height: 100px; border-radius: 10px; margin-top: 10px;">`;
        }
        document.getElementById('softwareModalTitle').textContent = 'Software bearbeiten';
      }
    } else {
      document.getElementById('softwareModalTitle').textContent = 'Neue Software';
    }
    
    softwareModalOverlay.classList.remove('hidden');
  }

  // Event Listener
  loginBtn.addEventListener('click', () => loginModalOverlay.classList.remove('hidden'));
  logoutBtn.addEventListener('click', () => signOut(auth));
  
  document.getElementById('cancelLoginBtn').addEventListener('click', () => loginModalOverlay.classList.add('hidden'));
  
  document.getElementById('submitLoginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
      loginModalOverlay.classList.add('hidden');
    } catch (error) {
      document.getElementById('loginError').textContent = error.message;
    }
  });

  // Abteilung Modal
  addDeptBtn.addEventListener('click', () => openDeptModal(null));
  document.getElementById('cancelDeptBtn').addEventListener('click', () => deptModalOverlay.classList.add('hidden'));
  document.getElementById('saveDeptBtn').addEventListener('click', async () => {
    const name = document.getElementById('deptNameInput').value.trim();
    if (!name) return alert('Name erforderlich');
    
    try {
      if (editingDeptId) {
        // Update (vereinfacht)
        alert('Update kommt in nächster Version');
      } else {
        await addDoc(collection(db, "departments"), { name });
      }
      deptModalOverlay.classList.add('hidden');
    } catch (error) {
      alert('Fehler: ' + error.message);
    }
  });

  // Software Modal
  addSoftwareBtn.addEventListener('click', () => {
    if (departments.length === 0) {
      alert('Bitte zuerst eine Abteilung erstellen!');
      openDeptModal(null);
      return;
    }
    openSoftwareModal(null);
  });
  
  document.getElementById('cancelSwBtn').addEventListener('click', () => softwareModalOverlay.classList.add('hidden'));
  
  // File Uploads
  document.getElementById('iconUploadBtn').addEventListener('click', () => document.getElementById('iconFile').click());
  document.getElementById('iconFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      iconFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('iconPreview').innerHTML = `<img src="${e.target.result}" style="width: 80px; height: 80px; border-radius: 10px;">`;
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById('previewUploadBtn').addEventListener('click', () => document.getElementById('previewFile').click());
  document.getElementById('previewFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      previewFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('previewImagePreview').innerHTML = `<img src="${e.target.result}" style="width: 100%; max-height: 100px; border-radius: 10px; margin-top: 10px;">`;
      };
      reader.readAsDataURL(file);
    }
  });

  // Software speichern
  document.getElementById('saveSwBtn').addEventListener('click', async () => {
    const name = document.getElementById('swName').value.trim();
    const version = document.getElementById('swVersion').value.trim() || '1.0.0';
    const url = document.getElementById('swLink').value.trim();
    const status = document.getElementById('swStatus').value;
    const description = document.getElementById('swDescription').value.trim();

    if (!name || !url) {
      return alert('Name und Download-Link sind erforderlich!');
    }

    let targetDept = selectedDeptId;
    if (!targetDept && departments.length > 0) {
      targetDept = departments[0].id;
    }

    try {
      let iconUrl = null;
      let previewUrl = null;

      if (iconFile) {
        const iconRef = ref(storage, `icons/${Date.now()}_${iconFile.name}`);
        await uploadBytes(iconRef, iconFile);
        iconUrl = await getDownloadURL(iconRef);
      }

      if (previewFile) {
        const previewRef = ref(storage, `previews/${Date.now()}_${previewFile.name}`);
        await uploadBytes(previewRef, previewFile);
        previewUrl = await getDownloadURL(previewRef);
      }

      const softwareData = {
        name,
        version,
        url,
        status,
        description,
        departmentId: targetDept,
        iconUrl,
        previewUrl,
        createdAt: serverTimestamp(),
        lastUpdated: serverTimestamp()
      };

      if (editingSwId) {
        // Update (vereinfacht)
        alert('Update kommt in nächster Version');
      } else {
        await addDoc(collection(db, "software"), softwareData);
      }

      softwareModalOverlay.classList.add('hidden');
    } catch (error) {
      alert('Fehler beim Speichern: ' + error.message);
    }
  });

  // Overlay Clicks
  deptModalOverlay.addEventListener('click', (e) => {
    if (e.target === deptModalOverlay) deptModalOverlay.classList.add('hidden');
  });
  softwareModalOverlay.addEventListener('click', (e) => {
    if (e.target === softwareModalOverlay) softwareModalOverlay.classList.add('hidden');
  });
  loginModalOverlay.addEventListener('click', (e) => {
    if (e.target === loginModalOverlay) loginModalOverlay.classList.add('hidden');
  });

  // Initial load
  loadData();
</script>
</body>
</html>
